<!DOCTYPE html>
<html>

<head>

<title>AWS Full Stack App</title>

<style>

body{
font-family: Arial;
text-align:center;
margin-top:50px;
background:#f2f2f2;
}

input{
padding:10px;
margin:10px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
background:#0078D4;
color:white;
border:none;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:22px;
color:green;
}

</style>

</head>

<body>

<h1>AWS Full Stack Calculator</h1>

<input id="num1" placeholder="Enter first number">

<input id="num2" placeholder="Enter second number">

<br>

<button onclick="calculate()">Add</button>

<h2 id="result"></h2>

<script>

async function calculate(){

let a = document.getElementById("num1").value;

let b = document.getElementById("num2").value;

let response = await fetch(
"https://0b41cix6xd.execute-api.ap-southeast-2.amazonaws.com/default/backend-demo?a="+a+"&b="+b
);

let data = await response.json();

let result = JSON.parse(data.body);

document.getElementById("result").innerText =
"Result = " + result.result;

}

</script>

</body>

</html>
