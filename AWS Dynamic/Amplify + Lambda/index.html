<!DOCTYPE html>
<html>

<head>
<title>Student App</title>
</head>

<body>

<h2>Add Student</h2>

<input id="name" placeholder="Name">

<input id="age" placeholder="Age">

<button onclick="addStudent()">Add</button>

<h2>Student List</h2>

<ul id="list"></ul>

<script>

  // Add Trigger -> API Gateway -> Create New API -> Security OPEN -> Save
  // Then copy the API endpoint and paste here
const API_URL="https://nufwtd8v0f.execute-api.ap-southeast-2.amazonaws.com/default/fullstack-func";

async function addStudent(){

const name=document.getElementById("name").value;

const age=document.getElementById("age").value;

await fetch(API_URL,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name,
age
})

});

loadStudents();

}

async function loadStudents(){

const res=await fetch(API_URL);

const data=await res.json();

const list=document.getElementById("list");

list.innerHTML="";

data.forEach(s=>{

const li=document.createElement("li");

li.textContent=s.name+" - "+s.age;

list.appendChild(li);

});

}

loadStudents();

</script>

</body>

</html>
