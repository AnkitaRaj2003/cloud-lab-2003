<!DOCTYPE html>
<html>
<head>
    <title>My Simple Website</title>

    <style>
        body{
            font-family: Arial;
            margin: 0;
            background-color: #f2f2f2;
        }

        header{
            background-color: #0078D4;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav{
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a{
            color: white;
            margin: 10px;
            text-decoration: none;
            font-size: 18px;
        }

        nav a:hover{
            color: yellow;
        }

        .content{
            padding: 20px;
            text-align: center;
        }

        footer{
            background-color: #0078D4;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>

</head>

<body>

<header>
    <h1>My Static Website</h1>
    <p>Welcome to my first website</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<div class="content">

    <h2>Home Page</h2>

    <p>This is a simple static website created using HTML and CSS.</p>

    <p>It does not require any server or database.</p>

</div>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
